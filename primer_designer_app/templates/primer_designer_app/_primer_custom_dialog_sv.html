<dialog id="primer-custom-dialog" class="primer-custom-dialog">
    <div class="primer-custom-dialog-panel">
        <button
            type="button"
            class="primer-dialog-x"
            aria-label="Close"
            onclick="document.getElementById('primer-custom-dialog').close()"
        >
            &times;
        </button>

        <h3 class="primer-dialog-title">Primer parameters</h3>

        <p class="primer-dialog-intro">
            These values are used for structural variant primer design.
            Adjust product size, Tm, GC content, and quality constraints.
        </p>

        <h4 class="primer-dialog-sub">Core</h4>
        <div class="primer-dialog-grid">
            <label>
                Product size min (bp)
                <input
                    type="number"
                    name="product_size_min"
                    value="{{ form_data.product_size_min|default:'100' }}"
                    min="1"
                    form="settings"
                >
            </label>

            <label>
                Product size max (bp)
                <input
                    type="number"
                    name="product_size_max"
                    value="{{ form_data.product_size_max|default:'300' }}"
                    min="1"
                    form="settings"
                >
            </label>

            <label>
                Optimal primer Tm (°C)
                <input
                    type="number"
                    name="tm"
                    value="{{ form_data.tm|default:'60' }}"
                    min="40"
                    max="85"
                    step="0.1"
                    form="settings"
                >
            </label>

            <label>
                GC content target (%)
                <input
                    type="number"
                    name="gc_content"
                    value="{{ form_data.gc_content|default:'50' }}"
                    min="1"
                    max="100"
                    form="settings"
                >
            </label>

            <label>
                Max poly-X
                <input
                    type="number"
                    name="max_poly_X"
                    value="{{ form_data.max_poly_X|default:'4' }}"
                    min="0"
                    max="20"
                    form="settings"
                >
            </label>
        </div>

        <h4 class="primer-dialog-sub">Primer length</h4>
        <div class="primer-dialog-grid">
            <label>
                PRIMER_OPT_SIZE
                <input type="number" name="p3_PRIMER_OPT_SIZE" value="20" min="1" form="settings">
            </label>

            <label>
                PRIMER_MIN_SIZE
                <input type="number" name="p3_PRIMER_MIN_SIZE" value="18" min="1" form="settings">
            </label>

            <label>
                PRIMER_MAX_SIZE
                <input type="number" name="p3_PRIMER_MAX_SIZE" value="22" min="1" form="settings">
            </label>
        </div>

        <h4 class="primer-dialog-sub">Quality</h4>
        <div class="primer-dialog-grid">
            <label>
                PRIMER_MAX_SELF_ANY
                <input type="number" name="p3_PRIMER_MAX_SELF_ANY" value="12" min="0" form="settings">
            </label>

            <label>
                PRIMER_MAX_SELF_END
                <input type="number" name="p3_PRIMER_MAX_SELF_END" value="8" min="0" form="settings">
            </label>
        </div>

        <div class="primer-dialog-actions">
            <button
                type="button"
                class="primer-dialog-done"
                onclick="document.getElementById('primer-custom-dialog').close()"
            >
                Done
            </button>
        </div>
    </div>
</dialog>
