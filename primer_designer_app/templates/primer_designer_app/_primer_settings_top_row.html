{# Top row: Reference genome, Amplicon check, Primer settings. Target padding & product size live in Primer parameters dialog. #}
{% load static %}
<link rel="stylesheet" href = "{% static 'primer_designer_app/settings_top_row.css' %}">

<div class="primer-settings-top-row">
    <div class="settings-container">
        <h2 class="settings-heading-help" title="Choose GRCh37 (hg19) or GRCh38 (hg38). Genomic coordinates and variant interpretation must match this assembly; Primer3 and in-silico amplicon checks use the reference sequence for the selected build.">Reference genome</h2>
        <div class="button-cover">
            <div class="button r" id="genome-button">
                <input type="checkbox" class="checkbox" id="reference-genome-switch" onchange="updateReferenceGenome()" {% if form_data.reference_genome == "GRCh38" %}checked{% endif %}/>
                <div class="knobs">
                <span></span>
                </div>
                    <div class="layer"></div>
            </div>
        </div>
        <input type="hidden" id="reference-genome" name="reference-genome" value="{{ form_data.reference_genome|default:'GRCh37' }}" form="settings">
    </div>

    {% if not is_structural_variant %}
    <div class="settings-container settings-container--amplicon-check">
        <h2 class="settings-heading-help" title="Optional search for additional PCR products (Dicey) in the reference genome or transcriptome. None skips this step. Genome uses the primary assembly FASTA file; Transcriptome uses the transcripts FASTA file. See README.md for more information.">Amplicon check</h2>
        <div class="UseCaseDiv" style="display:flex; justify-content: center">
            <div class="button-cover amplicon-button-cover">
                <div class="button r" id="amplicon-button" data-position="0" role="slider" tabindex="0" aria-valuemin="0" aria-valuemax="2" aria-valuenow="0" aria-valuetext="None">
                    <div class="knobs amplicon-knobs">
                        <span class="amplicon-pill"></span>
                        <button type="button" class="amplicon-opt" data-idx="0" tabindex="-1">None</button>
                        <button type="button" class="amplicon-opt" data-idx="1" tabindex="-1">Genome</button>
                        <button type="button" class="amplicon-opt" data-idx="2" tabindex="-1">Transcriptome</button>
                    </div>
                    <div class="layer"></div>
                </div>
            </div>
        </div>
        <input type="hidden" name="amplicon-check" id="amplicon-check-hidden" value="none" form="settings">
    </div>
    {% endif %}

    <div class="settings-container">
        <h2 class="settings-heading-help" title="Primer3 constraints (melting temperature, GC content, homopolymer limits, product size) use application defaults for the selected use case until you change them. Open Primer parameters to view or edit values for this submission.">Primer settings</h2>
        <button type="button" class="primer-custom-open-btn" id="primer-custom-open-btn" onclick="openPrimerCustomDialog()">Primer parameters…</button>
    </div>

</div>
